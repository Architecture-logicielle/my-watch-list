apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watchlist
  template:
    metadata:
      labels:
        app: watchlist
    spec:
      containers:
        - name: watchlist
          image: synticheattoh/my-watch-list:v2
          ports:
            - containerPort: 8000
          env:
            - name: DB_ENGINE
              value: django.db.backends.postgresql
            - name: DB_NAME
              value: watchlist
            - name: DB_USER
              value: watchlist_user
            - name: DB_PASSWORD
              value: watchlist_password
            - name: DB_HOST
              value: postgresql-service
            - name: DB_PORT
              value: "5432"
# This deployment creates 2 replicas of the watchlist application, which will be load balanced by the watchlist-service. The environment variables are set to allow the application to connect to the PostgreSQL database using the postgresql-service.