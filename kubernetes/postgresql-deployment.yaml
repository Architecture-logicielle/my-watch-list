apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: watchlist
            - name: POSTGRES_USER
              value: watchlist_user
            - name: POSTGRES_PASSWORD
              value: watchlist_password
          volumeMounts:
            - name: postgresql-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgresql-storage
          persistentVolumeClaim:
            claimName: postgresql-pvc
# This deployment creates a single replica of the PostgreSQL database using the official PostgreSQL 15 image. The environment variables are set to initialize the database with the name "watchlist", user "watchlist_user", and password "watchlist_password". The database data is stored in a persistent volume claim named "postgresql-pvc" to ensure data persistence across pod restarts.